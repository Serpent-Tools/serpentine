[test-groups]
docker = { max-threads = 1 }

[[profile.default.overrides]]
filter = "test(engine::containerd::) | test(tests::live_examples::) | test(tests::live_fails::)"
test-group = "docker"

[profile.integration_tests]
default-filter = "test(tests::live_examples::)"

[profile.snapshots]
default-filter = "test(snek::) | test(tests::live_fails::)"
